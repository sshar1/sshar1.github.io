<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
    <title>3D Voronoi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #main-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 0;
        }

        canvas {
            width: 80vmin;
            height: 80vmin;
            border-radius: 12px;
            touch-action: none;
        }

        /* ─── Sidebar ─── */

        #sidebar {
            width: 320px;
            height: 100vh;
            background: rgba(12, 12, 20, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            color: #c8c8d0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 28px 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .sidebar-header .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
            font-weight: 400;
        }

        #seed-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.08) transparent;
        }

        #seed-list::-webkit-scrollbar { width: 4px; }
        #seed-list::-webkit-scrollbar-track { background: transparent; }
        #seed-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }

        /* ─── Seed Card ─── */

        .seed-card {
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            transition: background 0.2s, border-color 0.2s;
        }

        .seed-card:hover {
            background: rgba(255, 255, 255, 0.055);
            border-color: rgba(255, 255, 255, 0.09);
        }

        .seed-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .seed-card-label {
            font-size: 13px;
            font-weight: 500;
            color: #e0e0e8;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .seed-card-coords {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.28);
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            margin-top: 5px;
            padding-left: 46px;
            letter-spacing: 0.02em;
        }

        /* ─── Toggle Switch ─── */

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.25s ease;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.55);
            top: 2px;
            left: 2px;
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: rgba(74, 144, 217, 0.45);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(16px);
            background: #5a9fe6;
        }

        /* ─── Color Swatch ─── */

        .color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.15s;
        }

        .color-swatch:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .color-swatch input[type="color"] {
            position: absolute;
            inset: -8px;
            width: calc(100% + 16px);
            height: calc(100% + 16px);
            border: none;
            cursor: pointer;
            opacity: 0;
        }

        /* ─── Delete Button ─── */

        .delete-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            font-size: 13px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            color: #e55;
            background: rgba(238, 85, 85, 0.1);
        }

        /* ─── Add Seed Section ─── */

        .add-seed-section {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .add-seed-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 12px;
        }

        .add-seed-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .coord-input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .coord-input-group label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 500;
        }

        .coord-input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 6px;
            color: #e0e0e8;
            padding: 7px 8px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        .coord-input-group input:focus {
            border-color: rgba(74, 144, 217, 0.45);
        }

        /* hide number spinners */
        .coord-input-group input[type="number"]::-webkit-inner-spin-button,
        .coord-input-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .coord-input-group input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .add-seed-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .add-seed-color {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            transition: border-color 0.2s, transform 0.15s;
        }

        .add-seed-color:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .add-seed-color input[type="color"] {
            position: absolute;
            inset: -8px;
            width: calc(100% + 16px);
            height: calc(100% + 16px);
            border: none;
            cursor: pointer;
            opacity: 0;
        }

        .add-btn {
            flex: 1;
            background: linear-gradient(135deg, rgba(74, 144, 217, 0.25), rgba(74, 144, 217, 0.10));
            border: 1px solid rgba(74, 144, 217, 0.25);
            color: #8dc0f0;
            padding: 9px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.1s;
            letter-spacing: -0.01em;
        }

        .add-btn:hover {
            background: linear-gradient(135deg, rgba(74, 144, 217, 0.4), rgba(74, 144, 217, 0.2));
            border-color: rgba(74, 144, 217, 0.45);
            color: #fff;
        }

        .add-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>

    <!-- ============ Box Shaders (GLSL 300 es) ============ -->

    <script id="vshader-box" type="x-shader/x-vertex">#version 300 es
    in vec3 aPosition;
    in vec3 aNormal;
    in vec3 aColor;

    uniform mat4 uModelViewProjection;
    uniform mat4 uNormalMatrix;
    uniform vec3 uLightDir;

    out float vDot;
    out vec3 vColor;

    void main() {
        gl_Position = uModelViewProjection * vec4(aPosition, 1.0);
        vec3 transNormal = normalize((uNormalMatrix * vec4(aNormal, 0.0)).xyz);
        vDot = max(dot(transNormal, normalize(uLightDir)), 0.0);
        vColor = aColor;
    }
</script>

    <script id="fshader-box" type="x-shader/x-fragment">#version 300 es
    precision mediump float;

    in float vDot;
    in vec3 vColor;
    out vec4 fragColor;

    void main() {
        fragColor = vec4(vColor, 1.0);
    }
</script>

    <!-- ============ Texture Baker Shaders (GLSL 300 es) ============ -->

    <script id="texture-baker-vertex" type="x-shader/x-vertex">#version 300 es
    in vec2 aPosition;
    out vec2 vUV;
    
    void main() {
        vUV = aPosition;
        gl_Position = vec4(aPosition, 0.0, 1.0);
    }
</script>

    <script id="texture-baker-fragment" type="x-shader/x-fragment">#version 300 es
    precision highp float;
    precision highp int;

    #define MAX_POINTS 64

    layout(std140) uniform VoronoiPoints {
        int  uNumPoints;
        vec4 uPoints[MAX_POINTS];
        vec4 uColors[MAX_POINTS];
    };

    uniform float uSliceZ;

    in vec2 vUV;
    out uvec4 fragColor;

    void main() {
        vec3 worldPos = vec3(vUV, uSliceZ);

        float minDist = 1e10;
        int closestIdx = 0;

        for (int i = 0; i < MAX_POINTS; i++) {
            if (i >= uNumPoints) break;
            float d = dot(worldPos - uPoints[i].xyz, worldPos - uPoints[i].xyz);
            if (d < minDist) {
                minDist = d;
                closestIdx = i;
            }
        }

        fragColor = uvec4(closestIdx, 0, 0, 0);
    }
</script>

    <script id="raymarch-vertex" type="x-shader/x-vertex">#version 300 es
    in vec3 aPosition;

    uniform mat4 uMVP;

    out vec3 vModelPos;

    void main() {
        vModelPos = aPosition;
        gl_Position = uMVP * vec4(aPosition, 1.0);
    }
</script>

    <script id="raymarch-fragment" type="x-shader/x-fragment">#version 300 es
    precision highp float;
    precision highp usampler3D;

    #define MAX_POINTS 64

    in vec3 vModelPos;
    out vec4 fragColor;

    uniform vec3 uCameraPos;
    uniform vec3 uLightDir;
    uniform uint uSeedMaskLow;
    uniform uint uSeedMaskHigh;
    uniform usampler3D uVolumeTexture;
    uniform float uTextureRes;

    layout(std140) uniform VoronoiPoints {
        int  uNumPoints;
        vec4 uPoints[MAX_POINTS];
        vec4 uColors[MAX_POINTS];
    };

    const int MAX_STEPS = 128;

    bool isEnabled(uint index) {
        if (index < 32u) {
            return ((uSeedMaskLow >> index) & 1u) != 0u;
        } else {
            return ((uSeedMaskHigh >> (index - 32u)) & 1u) != 0u;
        }
    }

    vec2 intersectBox(vec3 rayOrigin, vec3 rayDir, vec3 boxMin, vec3 boxMax) {
        vec3 tMin = (boxMin - rayOrigin) / rayDir;
        vec3 tMax = (boxMax - rayOrigin) / rayDir;

        vec3 t1 = min(tMin, tMax);
        vec3 t2 = max(tMin, tMax);

        float tNear = max(t1.x, max(t1.y, t1.z));
        float tFar = min(t2.x, min(t2.y, t2.z));

        return vec2(tNear, tFar);
    }

    vec3 cellColor(int index) {
        return uColors[index].rgb;
    }

    // Compute the cube face normal from the ray entry point.
    // The axis component closest to ±1 identifies which face was hit.
    vec3 cubeNormal(vec3 entryPos) {
        vec3 a = abs(entryPos);
        if (a.x > a.y && a.x > a.z) return vec3(sign(entryPos.x), 0.0, 0.0);
        if (a.y > a.z)              return vec3(0.0, sign(entryPos.y), 0.0);
                                    return vec3(0.0, 0.0, sign(entryPos.z));
    }

    void main() {
        vec3 ray_dir = normalize(vModelPos - uCameraPos);

        vec2 t = intersectBox(uCameraPos, ray_dir, vec3(-1.0), vec3(1.0));
        t.x = max(t.x, 0.0);
        if (t.x > t.y) {
            discard;
        }

        float ray_len = t.y - t.x;
        float step = ray_len / float(MAX_STEPS);
        uint prev_index = 0u;
        bool hit_prev = false;

        for (int i = 0; i < MAX_STEPS; i++) {
            float s = t.x + float(i) * step;
            vec3 pos = uCameraPos + ray_dir * s;
            vec3 uvw = pos * 0.5 + 0.5;

            uint index = texture(uVolumeTexture, uvw).r;

            if (isEnabled(index)) {
                vec3 normal;
                if (hit_prev) {
                    // Cell boundary: perpendicular bisector between the two seeds
                    normal = normalize(uPoints[prev_index].xyz - uPoints[index].xyz);
                } else {
                    // Cube entry face
                    vec3 entry_pos = uCameraPos + ray_dir * t.x;
                    normal = cubeNormal(entry_pos);
                }

                // Ensure normal faces toward the camera
                if (dot(normal, ray_dir) > 0.0) normal = -normal;

                float diffuse = max(dot(normal, uLightDir), 0.0);
                float light = 0.35 + 0.65 * diffuse;  // ambient + diffuse
                fragColor = vec4(cellColor(int(index)) * light, 1.0);
                return;
            }
            else {
                prev_index = index;
                hit_prev = true;
            }
        }
        
        discard;
    }
</script>

    <div id="main-area">
        <canvas id="glcanvas"></canvas>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Voronoi Seeds</h2>
            <div class="subtitle" id="seed-count">9 seeds</div>
        </div>
        <div id="seed-list"></div>
        <div class="add-seed-section" id="add-seed-section"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="input.js"></script>
    <script src="engine.js"></script>
</body>

</html>
